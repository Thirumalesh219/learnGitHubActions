name: Deployment

on:
  workflow_dispatch:
    inputs:
      ApprovalForDeployment:
        description: "Needs approval"
        required: true
        type: boolean
  repository_dispatch:

jobs:
  CreateBuild:
    runs-on: ubuntu-latest
    steps:
      - name: CreateBuild
        run: echo "CreatedBuild"

  RunTests:
    needs: CreateBuild
    runs-on: ubuntu-latest
    steps:
      - name: Run tests
        run: echo "Tests passed"
  
  Deploy:
    needs: RunTests
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: echo "Deploy code"
    if: ${{ inputs.ApprovalForDeployment }}
    environment: prod