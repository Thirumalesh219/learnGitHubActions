name: "My First CI job"

on: [pull_request_target,push]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy: 
      matrix: 
        node-version:[20]
    
    steps:
      -name: Checkout code
      uses: actions/checkout@v4

      -name: SetUp node js
      uses: actions/setup-node@v4
      with:
        node-version: ${{matrix.node-version}}
        cache: npm

      -name: Install dependencies
      run: npm ci

      -name: Build project
      run: npm run build