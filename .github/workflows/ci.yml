name: My First CI Job

on:
  push:
    branches:
    - main
    - new_branch
  pull_request:
     - main
     - Random_branch
jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: exp

    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: exp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # - name: Run tests
      #   run: npm run test